name: 'Terraform'

on:
  push:
    branches: [ "main" ]


jobs:
  terraform:
    name: 'Terraform'
    env:
      # AWS secrets
      AWS_ACCESS_KEY_ID: mock_key
      AWS_SECRET_ACCESS_KEY: mock_secret
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:4566

    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # The verified marketplace action that handles docker initialization cleanly
    - name: Start LocalStack Container
      run: |
        docker run -d \
          --name localstack_main \
          -p 4566:4566 \
          -p 4510-4559:4510-4559 \
          -v /var/run/docker.sock:/var/run/docker.sock \
          localstack/localstack:3.4.0
        
        # Wait until the endpoint responds successfully
        echo "Waiting for LocalStack to fully boot..."
        timeout 30s sh -c 'until curl -s http://localhost:4566/_localstack/health | grep -q "\"init\": true"; do sleep 2; done' || true

    # Install standard AWS CLI tools to interact with the container
    - name: Install awslocal CLI
      run: pip install awscli-local

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.6.6"

    # 2. Automate S3 Bucket Creation
    - name: Create Backend S3 Bucket
      run: awslocal s3api create-bucket --bucket my-local-b --region us-east-1

    # 3. Initialize using valid 1.6.x backend configuration arguments
    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="endpoint=http://localhost:4566" \
          -backend-config="sts_endpoint=http://localhost:4566" \
          -backend-config="iam_endpoint=http://localhost:4566" \
          -backend-config="skip_credentials_validation=true" \
          -backend-config="skip_metadata_api_check=true" \
          -backend-config="skip_requesting_account_id=true" \
          -backend-config="use_path_style=true"

    - name: Terraform Plan
      run: terraform plan

    - name: Terraform Apply
      run: terraform apply --auto-approve